<!-- IFLL popup — literary minimalism -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IFLL</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="p-container">

  <!-- Header -->
  <div class="p-header">
    <span class="p-logo">IFLL</span>
    <span class="p-subtitle">Immersive Learning</span>
  </div>

  <!-- Toggle -->
  <div class="p-toggle-bar">
    <label class="p-toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="p-toggle-track"><span class="p-toggle-knob"></span></span>
      <span class="p-toggle-label" id="toggleLabel">已开启</span>
    </label>
    <span id="reviewCount" style="display:none">
      <span class="p-review-badge" id="reviewBadge">0</span>
    </span>
  </div>

  <!-- Mode selector -->
  <div class="p-mode-bar">
    <div class="p-mode-selector" id="modeSelector">
      <button class="p-mode-btn p-mode-active" data-mode="replace">替换学习</button>
      <button class="p-mode-btn" data-mode="annotate">标注学习</button>
      <button class="p-mode-btn" data-mode="translate">对比翻译</button>
      <button class="p-mode-btn" data-mode="off">关闭</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="p-section">
    <div class="p-row">
      <label class="p-label" for="frequency">替换密度</label>
      <select id="frequency" class="p-select">
        <option value="low">低</option>
        <option value="medium" selected>中</option>
        <option value="high">高</option>
      </select>
    </div>
    <div class="p-row">
      <label class="p-label" for="level">词汇等级</label>
      <select id="level" class="p-select">
        <option value="cet4" selected>CET-4</option>
        <option value="cet6">CET-6</option>
        <option value="ielts">IELTS</option>
        <option value="graduate">考研</option>
      </select>
    </div>
    <div class="p-row">
      <label class="p-label" for="dailyCount">每日新词</label>
      <select id="dailyCount" class="p-select">
        <option value="5">5 词</option>
        <option value="10">10 词</option>
        <option value="15" selected>15 词</option>
        <option value="20">20 词</option>
        <option value="30">30 词</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="p-section" id="statsSection">
    <div class="p-section-header">今日统计</div>
    <div class="p-stats">
      <div class="p-stat"><span class="p-stat-num" id="statReplace">0</span><span class="p-stat-label">替换词数</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statAnnotate">0</span><span class="p-stat-label">标注词数</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statTranslate">0</span><span class="p-stat-label">翻译句数</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statMinutes">0</span><span class="p-stat-label">累计学习</span></div>
    </div>
    <div class="p-section-header">词库</div>
    <div class="p-stats">
      <div class="p-stat"><span class="p-stat-num" id="statWordbank">0</span><span class="p-stat-label">收录词汇</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statIpa">0</span><span class="p-stat-label">IPA 覆盖</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statKnown">0</span><span class="p-stat-label">已掌握</span></div>
      <div class="p-stat"><span class="p-stat-num" id="statReview">0</span><span class="p-stat-label">复习中</span></div>
    </div>
    <div class="p-section-header">词库预处理</div>
    <div class="p-batch">
      <div class="p-batch-row">
        <span class="p-batch-label">预生成深度解析</span>
        <input type="number" id="batchCount" class="p-input p-input-sm" value="100" min="10" max="1000" style="width:60px">
        <span class="p-batch-label">词</span>
        <button id="batchStart" class="p-btn p-btn-sm">开始</button>
        <button id="batchStop" class="p-btn p-btn-sm p-btn-ghost" style="display:none">停止</button>
      </div>
      <div class="p-batch-progress" id="batchProgress" style="display:none">
        <div class="p-batch-bar"><div class="p-batch-fill" id="batchFill"></div></div>
        <span class="p-batch-text" id="batchText">0/0</span>
      </div>
    </div>
  </div>

  <!-- Excluded sites -->
  <div class="p-section">
    <div class="p-row">
      <span class="p-label">弹窗主题</span>
      <select id="tooltipTheme" class="p-select">
        <option value="auto">自动</option>
        <option value="light">明亮</option>
        <option value="dark">暗黑</option>
      </select>
    </div>
  </div>

  <div class="p-section">
    <div class="p-row">
      <span class="p-label">排除站点</span>
      <button id="excludeCurrent" class="p-btn p-btn-sm p-btn-danger">排除当前</button>
    </div>
    <div class="p-excluded-list" id="excludedList"></div>
  </div>

  <!-- Custom AI actions -->
  <details class="p-api">
    <summary>自定义 AI 动作</summary>
    <p class="p-api-hint">自定义提示词模板。{word} {zh} {def} 为占位符。</p>
    <div id="customActionsList" class="p-actions-list"></div>
    <div class="p-batch-row" style="margin-top:6px">
      <input type="text" id="actName" class="p-input p-input-sm" placeholder="动作名称" style="flex:1">
      <button id="actAdd" class="p-btn p-btn-sm">+ 添加</button>
    </div>
    <div id="actEditor" style="display:none;margin-top:6px">
      <textarea id="actPrompt" class="p-textarea" rows="3" placeholder="提示词模板，如: 用简单中文解释 {word}" style="width:100%;margin-top:2px"></textarea>
      <input type="text" id="actFields" class="p-input" placeholder="输出字段(逗号分隔，如: synonyms,usage)" style="width:100%;margin-top:4px">
      <div class="p-batch-row" style="margin-top:4px">
        <button id="actSave" class="p-btn p-btn-sm">保存</button>
        <button id="actDel" class="p-btn p-btn-sm p-btn-ghost">删除</button>
        <span id="actEditId" style="display:none"></span>
      </div>
    </div>
  </details>

  <!-- API settings -->
  <details class="p-api">
    <summary>API 设置</summary>
    <p class="p-api-hint">配置 AI API 后可点击替换词获取深度解析与例句。仅用于主动触发的 AI 功能。</p>
    <div class="p-row">
      <label class="p-label" for="apiEndpoint">API 地址</label>
      <select id="apiEndpoint" class="p-select">
        <option value="https://api.deepseek.com">DeepSeek</option>
        <option value="https://opencode.ai/zen/go/v1">OpenCode Go</option>
        <option value="https://api.openai.com/v1">OpenAI</option>
        <option value="https://openrouter.ai/api/v1">OpenRouter</option>
        <option value="__custom__">自定义</option>
      </select>
    </div>
    <div id="apiEndpointCustomRow" style="display:none">
      <input type="text" id="apiEndpointCustom" class="p-input" placeholder="https://your-api.com/v1">
    </div>
    <div class="p-row">
      <label class="p-label" for="apiModel">模型名称</label>
      <select id="apiModel" class="p-select" style="flex:1">
        <option value="deepseek-v4-flash">deepseek-v4-flash</option>
      </select>
      <button id="refreshModels" class="p-btn p-btn-sm" style="flex-shrink:0">刷新</button>
    </div>
    <div class="p-row">
      <label class="p-label" for="apiKey">API Key</label>
      <input type="password" id="apiKey" class="p-input" placeholder="sk-...">
    </div>
    <div class="p-row">
      <button id="testApi" class="p-btn p-btn-sm">测试连接</button>
      <button id="saveApi" class="p-btn p-btn-sm p-btn-primary">保存</button>
    </div>
  </details>

  <!-- Voice settings -->
  <details class="p-api">
    <summary>发音设置</summary>
    <p class="p-api-hint">选择朗读单词的发音引擎</p>
    <div class="p-row">
      <label class="p-label" for="voiceSelect">发音风格</label>
      <select id="voiceSelect" class="p-select" style="flex:1">
        <option value="">系统默认</option>
      </select>
    </div>
  </details>

  <!-- Footer -->
  <div class="p-footer">
    <button id="refreshPage" class="p-btn p-btn-sm">刷新当前页</button>
  </div>
  <div class="p-footer p-footer-io">
    <button id="exportConfig" class="p-btn-ghost">导出配置</button>
    <button id="importConfig" class="p-btn-ghost">导入配置</button>
    <input type="file" id="importFileInput" style="display:none" accept=".json">
  </div>
  <div class="p-footer p-footer-privacy">
    <span>数据均储存在本机，代码开源</span>
    <a href="https://github.com/uvian/IFLL-Web" target="_blank" rel="noopener">GitHub</a>
  </div>

</div>
<script src="../lib/wordbank.js"></script>
<script src="../lib/notebase.js"></script>
<script src="../lib/storage.js"></script>
<script src="popup.js"></script>
</body>
</html>
