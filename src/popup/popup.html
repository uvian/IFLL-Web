<!-- IFLL popup settings -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IFLL</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="p-container">

    <div class="p-header">
      <h1 class="p-logo">IFLL</h1>
      <span class="p-subtitle">v0.1</span>
    </div>

    <!-- Toggle + Mode -->
    <div class="p-mode-bar">
      <label class="p-toggle">
        <input type="checkbox" id="enabled">
        <span class="p-toggle-track">
          <span class="p-toggle-knob"></span>
        </span>
        <span class="p-toggle-label" id="toggleLabel">已开启</span>
      </label>
      <div class="p-mode-selector" id="modeSelector">
        <button data-mode="replace" class="p-mode-btn p-mode-active" title="将中文替换为英文">🔄 替换</button>
        <button data-mode="annotate" class="p-mode-btn" title="英文词下方标注中文释义">✏️ 标注</button>
        <button data-mode="translate" class="p-mode-btn" title="段落整段对照翻译">📑 对比</button>
        <button data-mode="off" class="p-mode-btn" title="当前页面不学习">🚫 关闭</button>
      </div>
    </div>

    <!-- Settings -->
    <div class="p-section" id="replaceSettings">
      <div class="p-row">
        <label class="p-label" for="frequency">替换频率</label>
        <select id="frequency" class="p-select">
          <option value="low">低 (偶尔)</option>
          <option value="medium" selected>中 (适中)</option>
          <option value="high">高 (密集)</option>
        </select>
      </div>
      <div class="p-row">
        <label class="p-label" for="level">词汇等级</label>
        <select id="level" class="p-select">
          <option value="cet4" selected>CET-4 四级</option>
          <option value="cet6">CET-6 六级</option>
          <option value="ielts">IELTS 雅思</option>
          <option value="graduate">考研</option>
        </select>
      </div>
    </div>

    <!-- Daily word count -->
    <div class="p-section">
      <div class="p-row">
        <label class="p-label" for="dailyCount">每日新词</label>
        <select id="dailyCount" class="p-select">
          <option value="5">5 词</option>
          <option value="10">10 词</option>
          <option value="15" selected>15 词</option>
          <option value="20">20 词</option>
          <option value="30">30 词</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="p-section p-stats">
      <span title="内置词库">📚 <strong id="wordCount">0</strong></span>
      <span title="已掌握">✅ <strong id="knownCount">0</strong></span>
      <span title="待复习">📝 <strong id="reviewCount">0</strong></span>
      <span title="今日学习">📊 <strong id="todayCount">0</strong></span>
    </div>

    <!-- Excluded Sites -->
    <details class="p-api" open>
      <summary>排除的网站 (<span id="excludedCount">0</span>)</summary>
      <div id="excludedList" class="p-excluded-list">
        <span class="p-empty">暂无排除的网站</span>
      </div>
      <div class="p-row" style="justify-content:space-between">
        <button id="excludeCurrent" class="p-btn p-btn-sm p-btn-outline">⛔ 排除当前页面</button>
        <button id="clearExcluded" class="p-btn p-btn-sm p-btn-danger">清除全部</button>
      </div>
    </details>

    <!-- API settings -->
    <details class="p-api">
      <summary>AI 增强 (可选)</summary>
      <p class="p-api-hint">配置 AI API 后可点击替换词生成更多地道例句</p>
      <div class="p-row">
        <label class="p-label" for="apiEndpoint">API 地址</label>
        <select id="apiEndpoint" class="p-select p-select-wide">
          <option value="https://api.deepseek.com">DeepSeek</option>
          <option value="https://opencode.ai/zen/go/v1">OpenCode Go</option>
          <option value="https://api.openai.com/v1">OpenAI</option>
          <option value="https://openrouter.ai/api/v1">OpenRouter</option>
          <option value="__custom__">自定义</option>
        </select>
      </div>
      <div id="apiEndpointCustomRow" class="p-row" style="display:none">
        <input type="text" id="apiEndpointCustom" class="p-input" placeholder="https://your-api.com/v1">
      </div>
      <div class="p-row">
        <label class="p-label" for="apiModel">模型名</label>
        <div class="p-row-grow">
          <select id="apiModel" class="p-select p-select-wide">
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="claude-sonnet-4">claude-sonnet-4</option>
          </select>
          <button id="refreshModels" class="p-btn-icon" title="获取最新模型列表">↻</button>
        </div>
      </div>
      <div class="p-row">
        <label class="p-label" for="apiKey">API Key</label>
        <input type="password" id="apiKey" class="p-input" placeholder="sk-...">
      </div>
      <div class="p-row" style="justify-content:space-between">
        <button id="testApi" class="p-btn p-btn-sm p-btn-outline">🔌 测试连接</button>
        <button id="saveApi" class="p-btn p-btn-sm">保存</button>
      </div>
    </details>

    <!-- Pronunciation settings -->
    <details class="p-api">
      <summary>发音设置</summary>
      <p class="p-api-hint">选择朗读单词的发音风格（点击 🔊 按钮试听）</p>
      <div class="p-row">
        <label class="p-label" for="voiceSelect">发音</label>
        <select id="voiceSelect" class="p-select p-select-wide">
          <option value="">默认 (浏览器自动选择)</option>
        </select>
      </div>
    </details>

    <!-- Footer -->
    <div class="p-footer">
      <button id="refreshPage" class="p-btn p-btn-outline">刷新当前页</button>
      <button id="openPdfViewer" class="p-btn-pdf">📄 PDF 翻译</button>
    </div>
    <div class="p-footer p-footer-io">
      <button id="exportConfig" class="p-btn p-btn-outline-sm">📤 导出配置</button>
      <button id="importConfig" class="p-btn p-btn-outline-sm">📥 导入配置</button>
    </div>
    <input type="file" id="importFileInput" accept=".json" style="display:none">

  </div>
  <script src="../lib/storage.js"></script>
  <script src="../lib/wordbank.js"></script>
  <script src="popup.js"></script>
</body>
</html>
