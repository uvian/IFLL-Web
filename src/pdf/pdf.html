<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IFLL · PDF 对照翻译</title>
  <script src="https://unpkg.com/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
  <link rel="stylesheet" href="pdf.css">
</head>
<body>
  <div class="ifll-pdf-topbar">
    <span class="ifll-pdf-logo">IFLL PDF</span>
    <span class="ifll-pdf-filename" id="filename">—</span>
    <div class="ifll-pdf-toolbar">
      <input type="url" id="pdfUrlInput" class="ifll-pdf-url" placeholder="PDF URL 或拖入文件...">
      <button id="openPdf" class="ifll-pdf-btn">打开</button>
      <button id="translateAll" class="ifll-pdf-btn ifll-pdf-btn-primary">全部翻译</button>
      <span id="status" class="ifll-pdf-status">—</span>
    </div>
  </div>
  <div class="ifll-pdf-main">
    <div id="pdfViewer" class="ifll-pdf-viewer">
      <div class="ifll-pdf-empty">
        <p>📄 粘贴 PDF URL 或拖入 PDF 文件</p>
        <p class="ifll-pdf-empty-hint">支持 .pdf 直链和本地文件</p>
      </div>
    </div>
    <div id="transPanel" class="ifll-pdf-trans">
      <div class="ifll-pdf-trans-header">📑 对照翻译</div>
      <div id="transContent" class="ifll-pdf-trans-content">
        <p class="ifll-pdf-trans-empty">点击「全部翻译」开始</p>
      </div>
    </div>
  </div>
  <script src="../lib/storage.js"></script>
  <script src="pdf.js" type="module"></script>
</body>
</html>
